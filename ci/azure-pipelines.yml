# Azure Pipelines — CI Pipeline
# Runs on push to main/develop and on pull requests targeting those branches.
# Pull requests execute smoke tests only (Category=High&Category=Smoke) for fast feedback.
# Push to main/develop executes the full test suite across all browsers.
#
# Shared credential variables (set in Azure DevOps → Library or Pipeline Variables):
#   TEST_SHARED_EMAIL / TEST_SHARED_PASSWORD
# These are mapped to all role-specific env vars at runtime.

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

variables:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  buildConfiguration: 'Release'

stages:

  # ── Stage 1: Build ────────────────────────────────────────────────────────────
  - stage: Build
    displayName: Build
    jobs:
      - job: Build
        displayName: Restore and Build
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: UseDotNet@2
            displayName: Install .NET ${{ variables.DOTNET_VERSION }}
            inputs:
              version: $(DOTNET_VERSION)

          - task: Cache@2
            displayName: Cache NuGet packages
            inputs:
              key: 'nuget | "$(Agent.OS)" | **/packages.lock.json'
              restoreKeys: 'nuget | "$(Agent.OS)"'
              path: $(NUGET_PACKAGES)
            continueOnError: true

          - script: dotnet restore
            displayName: Restore

          - script: dotnet build --no-restore --configuration $(buildConfiguration)
            displayName: Build

  # ── Stage 2: Test ─────────────────────────────────────────────────────────────
  - stage: Test
    displayName: Test
    dependsOn: Build
    jobs:

      # API Tests
      - job: APITests
        displayName: API Tests
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: UseDotNet@2
            displayName: Install .NET
            inputs:
              version: $(DOTNET_VERSION)

          - script: |
              dotnet restore
              dotnet build --no-restore --configuration $(buildConfiguration)
            displayName: Restore and Build

          - script: |
              if [ "$(Build.Reason)" = "PullRequest" ]; then
                COMMON_FILTER="Category=High&Category=Smoke"
              else
                COMMON_FILTER=""
              fi

              ROLES=(user admin organizer viewer)
              AVAILABLE_ROLES=()
              for role in "${ROLES[@]}"; do
                prefix=$(echo "$role" | tr '[:lower:]' '[:upper:]')
                email_var="TEST_${prefix}_EMAIL"
                password_var="TEST_${prefix}_PASSWORD"
                email_value="${!email_var}"
                password_value="${!password_var}"
                if [ -n "$email_value" ] && [ -n "$password_value" ]; then
                  AVAILABLE_ROLES+=("$role")
                fi
              done

              if [ ${#AVAILABLE_ROLES[@]} -eq 0 ]; then
                echo "No role credentials configured. Set at least one TEST_<ROLE>_EMAIL/TEST_<ROLE>_PASSWORD pair."
                exit 1
              fi

              echo "Available roles: ${AVAILABLE_ROLES[*]}"

              ROLE_AGNOSTIC_FILTER="Category!=user&Category!=admin&Category!=organizer&Category!=viewer"
              if [ -n "$COMMON_FILTER" ]; then
                FILTER="$ROLE_AGNOSTIC_FILTER&$COMMON_FILTER"
              else
                FILTER="$ROLE_AGNOSTIC_FILTER"
              fi
              echo "Running role-agnostic API tests with filter: $FILTER"
              dotnet test tests/APITests/APITests.csproj --no-build --configuration $(buildConfiguration) --filter "$FILTER"

              for role in "${AVAILABLE_ROLES[@]}"; do
                ROLE_FILTER="Category=$role"
                if [ -n "$COMMON_FILTER" ]; then
                  FILTER="$ROLE_FILTER&$COMMON_FILTER"
                else
                  FILTER="$ROLE_FILTER"
                fi
                echo "Running API tests for role '$role' with filter: $FILTER"
                TEST_EXECUTION_ROLE="$role" dotnet test tests/APITests/APITests.csproj --no-build --configuration $(buildConfiguration) --filter "$FILTER"
              done
            displayName: Run API Tests
            env:
              TEST_SHARED_EMAIL: $(TEST_SHARED_EMAIL)
              TEST_SHARED_PASSWORD: $(TEST_SHARED_PASSWORD)
              TEST_USER_EMAIL: $(TEST_SHARED_EMAIL)
              TEST_USER_PASSWORD: $(TEST_SHARED_PASSWORD)
              TEST_ADMIN_EMAIL: $(TEST_SHARED_EMAIL)
              TEST_ADMIN_PASSWORD: $(TEST_SHARED_PASSWORD)
              TEST_ORGANIZER_EMAIL: $(TEST_SHARED_EMAIL)
              TEST_ORGANIZER_PASSWORD: $(TEST_SHARED_PASSWORD)
              TEST_VIEWER_EMAIL: $(TEST_SHARED_EMAIL)
              TEST_VIEWER_PASSWORD: $(TEST_SHARED_PASSWORD)

      # UI Tests — cross-browser matrix
      - job: UITests
        displayName: UI Tests — $(browser)
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          matrix:
            Chrome:
              browser: chrome
            Firefox:
              browser: firefox
            Edge:
              browser: edge
        steps:
          - task: UseDotNet@2
            displayName: Install .NET
            inputs:
              version: $(DOTNET_VERSION)

          - script: |
              dotnet restore
              dotnet build --no-restore --configuration $(buildConfiguration)
            displayName: Restore and Build

          - script: |
              if [ "$(Build.Reason)" = "PullRequest" ]; then
                COMMON_FILTER="Category=High&Category=Smoke"
              else
                COMMON_FILTER=""
              fi

              ROLES=(user admin organizer viewer)
              AVAILABLE_ROLES=()
              for role in "${ROLES[@]}"; do
                prefix=$(echo "$role" | tr '[:lower:]' '[:upper:]')
                email_var="TEST_${prefix}_EMAIL"
                password_var="TEST_${prefix}_PASSWORD"
                email_value="${!email_var}"
                password_value="${!password_var}"
                if [ -n "$email_value" ] && [ -n "$password_value" ]; then
                  AVAILABLE_ROLES+=("$role")
                fi
              done

              if [ ${#AVAILABLE_ROLES[@]} -eq 0 ]; then
                echo "No role credentials configured. Set at least one TEST_<ROLE>_EMAIL/TEST_<ROLE>_PASSWORD pair."
                exit 1
              fi

              echo "Available roles: ${AVAILABLE_ROLES[*]}"

              ROLE_AGNOSTIC_FILTER="Category!=user&Category!=admin&Category!=organizer&Category!=viewer"
              if [ -n "$COMMON_FILTER" ]; then
                FILTER="$ROLE_AGNOSTIC_FILTER&$COMMON_FILTER"
              else
                FILTER="$ROLE_AGNOSTIC_FILTER"
              fi
              echo "Running role-agnostic UI tests with filter: $FILTER"
              dotnet test tests/UITests/UITests.csproj --no-build --configuration $(buildConfiguration) --filter "$FILTER"

              for role in "${AVAILABLE_ROLES[@]}"; do
                ROLE_FILTER="Category=$role"
                if [ -n "$COMMON_FILTER" ]; then
                  FILTER="$ROLE_FILTER&$COMMON_FILTER"
                else
                  FILTER="$ROLE_FILTER"
                fi
                echo "Running UI tests for role '$role' with filter: $FILTER"
                TEST_EXECUTION_ROLE="$role" dotnet test tests/UITests/UITests.csproj --no-build --configuration $(buildConfiguration) --filter "$FILTER"
              done
            displayName: Run UI Tests — $(browser)
            env:
              TEST_SHARED_EMAIL: $(TEST_SHARED_EMAIL)
              TEST_SHARED_PASSWORD: $(TEST_SHARED_PASSWORD)
              TEST_USER_EMAIL: $(TEST_SHARED_EMAIL)
              TEST_USER_PASSWORD: $(TEST_SHARED_PASSWORD)
              TEST_ADMIN_EMAIL: $(TEST_SHARED_EMAIL)
              TEST_ADMIN_PASSWORD: $(TEST_SHARED_PASSWORD)
              TEST_ORGANIZER_EMAIL: $(TEST_SHARED_EMAIL)
              TEST_ORGANIZER_PASSWORD: $(TEST_SHARED_PASSWORD)
              TEST_VIEWER_EMAIL: $(TEST_SHARED_EMAIL)
              TEST_VIEWER_PASSWORD: $(TEST_SHARED_PASSWORD)
              TestSettings__Browser: $(browser)
              TestSettings__Headless: 'true'
